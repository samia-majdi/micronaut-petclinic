micronaut:
  server:
    port: -1
  application:
    name: micronaut-petclinic-test

# Test datasource configuration (H2 in-memory)
datasources:
  default:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    schema-generate: CREATE_DROP
    dialect: H2

# Enable sample data for tests
petclinic:
  sample-data:
    enabled: true
