micronaut:
  application:
    name: micronaut-petclinic-test
  server:
    port: -1
  views:
    thymeleaf:
      enabled: false
    jte:
      dynamic: true

# Test datasource configuration (H2 in-memory)
datasources:
  default:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    dialect: H2

jpa:
  default:
    entity-scan:
      packages: io.micronaut.samples.petclinic.model
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: true

# Enable sample data for tests
petclinic:
  sample-data:
    enabled: true
