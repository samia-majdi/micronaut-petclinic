micronaut:
  application:
    name: micronaut-petclinic
  server:
    port: 8080
  router:
    static-resources:
      default:
        enabled: true
        mapping: /resources/**
        paths: classpath:static
  caches:
    vets:
      expire-after-write: 60s
      maximum-size: 100
  views:
    thymeleaf:
      enabled: true
  messages:
    basename: i18n/messages

# Default datasource configuration (H2 in-memory)
datasources:
  default:
    # Keep table name casing consistent with quoted SQL generated by Micronaut Data.
    url: jdbc:h2:mem:petclinic;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    schema-generate: CREATE_DROP
    dialect: H2



# Sample data configuration
petclinic:
  sample-data:
    enabled: true

# Logging configuration
logger:
  levels:
    io.micronaut.samples.petclinic: DEBUG
    io.micronaut.data: DEBUG
